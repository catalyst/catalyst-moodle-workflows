name: 'Plugin Release'
description: 'Release at Moodle.org'
inputs:
  plugin_name:
    required: true
    type: string
  moodle_org_token:
    required: true
runs:
  using: "composite"
  steps:
    - name: Check out repository code
      uses: actions/checkout@v2
      with:
        path: plugin
    - name: Release at Moodle.org by calling the service function
      id: add-version
      env:
        PLUGIN: ${{ inputs.plugin_name }}
        ENDPOINT: https://moodle.org/webservice/rest/server.php
        TOKEN: ${{ inputs.moodle_org_token }}
        FUNCTION: local_plugins_add_version
      run: |
        HEADERS_FILE=$(mktemp)
        RESPONSE=$(curl -s -D "${HEADERS_FILE}" "${ENDPOINT}" \
          --data-urlencode "wstoken=${TOKEN}" \
          --data-urlencode "wsfunction=${FUNCTION}" \
          --data-urlencode "moodlewsrestformat=json" \
          --data-urlencode "frankenstyle=${PLUGIN}" \
          --data-urlencode "zipurl=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/archive/refs/heads/${GITHUB_REF_NAME}.zip" \
          --data-urlencode "vcssystem=git" \
          --data-urlencode "vcsrepositoryurl=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
          --data-urlencode "vcstag=${TAGNAME}" \
          --data-urlencode "vcsbranch=${GITHUB_REF_NAME}" \
          --data-urlencode "changelogurl=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}" \
          --data-urlencode "altdownloadurl=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/archive/refs/heads/${GITHUB_REF_NAME}.zip")
        {
          echo "response=${RESPONSE}"
          echo "response_headers<<EOF"
          cat "${HEADERS_FILE}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
      shell: bash

    - name: Evaluate the response
      id: evaluate-response
      env:
        RESPONSE: ${{ steps.add-version.outputs.response }}
        RESPONSE_HEADERS: ${{ steps.add-version.outputs.response_headers }}
        PLUGIN: ${{ inputs.plugin_name }}
      run: |
        jq <<< "${RESPONSE}" || true
        if ! jq --exit-status ".id" <<< "${RESPONSE}" > /dev/null 2>&1; then
          echo "Initial API call did not return a version ID."
          echo "Response headers:"
          echo "${RESPONSE_HEADERS}"
          echo "Response body:"
          echo "${RESPONSE}"
          echo ""
          echo "The endpoint may have timed out but still processed the request."

          PLUGIN_VERSION=$(grep -oP '\$plugin->version\s*=\s*\K[0-9]+' plugin/version.php)

          # Derive the Moodle branch from the lower bound of $plugin->supported in version.php.
          # e.g. $plugin->supported = [500, 501]; → 500 → 5.0
          SUPPORTED_LOWER=$(grep -oP '\$plugin->supported\s*=\s*\[\K[0-9]+' plugin/version.php)
          MOODLE_BRANCH="${SUPPORTED_LOWER:0:1}.$((10#${SUPPORTED_LOWER:1}))"

          echo "Checking moodle.org for plugin version ${PLUGIN_VERSION} (Moodle branch ${MOODLE_BRANCH})..."
          echo "Polling every 30s for up to 2 minutes..."

          FOUND=false
          for i in 1 2 3 4; do
            echo "Check attempt ${i}/4..."
            CHECK_RESPONSE=$(curl -s -X POST "https://download.moodle.org/api/1.3/updates.php" \
              --data-urlencode "format=json" \
              --data-urlencode "branch=${MOODLE_BRANCH}" \
              --data-urlencode "plugins=${PLUGIN}@0")
            echo "Plugin versions response:"
            jq ".updates.${PLUGIN}" <<< "${CHECK_RESPONSE}" || echo "${CHECK_RESPONSE}"
            if jq --exit-status \
                ".updates.${PLUGIN}[] | select(.version == \"${PLUGIN_VERSION}\")" \
                <<< "${CHECK_RESPONSE}" > /dev/null 2>&1; then
              echo "Success: version ${PLUGIN_VERSION} is registered on moodle.org."
              FOUND=true
              break
            fi
            if [ "${i}" -lt 4 ]; then
              echo "Not found yet, waiting 30 seconds..."
              sleep 30
            fi
          done
          if [ "${FOUND}" != "true" ]; then
            echo "Version ${PLUGIN_VERSION} was not found on moodle.org after polling. Giving up."
            exit 1
          fi
        fi
      shell: bash
