name: 'Plugin Release'
description: 'Release at Moodle.org'
inputs:
  plugin_name:
    required: true
    type: string
  moodle_org_token:
    required: true
runs:
  using: "composite"
  steps:
    - name: Check out repository code
      uses: actions/checkout@v2
      with:
        path: plugin
    - name: Check if version is already deployed
      # Instead of checking whether version.php changed in the triggering commit,
      # we compare the local version against what is already on moodle.org.
      # This means a version bump that initially failed CI will still deploy once
      # CI goes green on a later commit, without needing to re-touch version.php.
      id: version-check
      env:
        PLUGIN: ${{ inputs.plugin_name }}
        ENDPOINT: https://moodle.org/webservice/rest/server.php
        TOKEN: ${{ inputs.moodle_org_token }}
      run: |
        LOCAL_VERSION=$(grep -oP '\$plugin->version\s*=\s*\K[0-9]+' plugin/version.php)
        echo "Local version.php version: ${LOCAL_VERSION}"

        RESPONSE=$(curl -s "${ENDPOINT}" \
          --data-urlencode "wstoken=${TOKEN}" \
          --data-urlencode "wsfunction=local_plugins_get_plugin_versions" \
          --data-urlencode "moodlewsrestformat=json" \
          --data-urlencode "frankenstyle=${PLUGIN}")

        # If the response isn't a JSON array (e.g. network error or auth failure),
        # fall through and attempt deployment so we don't silently skip a real release.
        if ! echo "${RESPONSE}" | jq -e 'type == "array"' > /dev/null 2>&1; then
          echo "Could not query current versions from moodle.org — will attempt deployment anyway."
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Find the highest version number already deployed on this branch.
        REMOTE_VERSION=$(echo "${RESPONSE}" | jq -r \
          "[.[] | select(.vcsbranch == \"${GITHUB_REF_NAME}\")] | map(.version) | max // 0")

        echo "Latest deployed version on branch ${GITHUB_REF_NAME}: ${REMOTE_VERSION}"

        if [ "${LOCAL_VERSION}" -gt "${REMOTE_VERSION}" ]; then
          echo "Local version ${LOCAL_VERSION} is newer — deploying."
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
        else
          echo "Version ${LOCAL_VERSION} is already deployed on branch ${GITHUB_REF_NAME}. Nothing to do."
          echo "should_deploy=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - name: Release at Moodle.org by calling the service function
      if: steps.version-check.outputs.should_deploy == 'true'
      id: add-version
      env:
        PLUGIN: ${{ inputs.plugin_name }}
        ENDPOINT: https://moodle.org/webservice/rest/server.php
        TOKEN: ${{ inputs.moodle_org_token }}
        FUNCTION: local_plugins_add_version
      run: |
        HEADERS_FILE=$(mktemp)
        RESPONSE=$(curl -s -D "${HEADERS_FILE}" "${ENDPOINT}" \
          --data-urlencode "wstoken=${TOKEN}" \
          --data-urlencode "wsfunction=${FUNCTION}" \
          --data-urlencode "moodlewsrestformat=json" \
          --data-urlencode "frankenstyle=${PLUGIN}" \
          --data-urlencode "zipurl=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/archive/refs/heads/${GITHUB_REF_NAME}.zip" \
          --data-urlencode "vcssystem=git" \
          --data-urlencode "vcsrepositoryurl=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
          --data-urlencode "vcstag=${TAGNAME}" \
          --data-urlencode "vcsbranch=${GITHUB_REF_NAME}" \
          --data-urlencode "changelogurl=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}" \
          --data-urlencode "altdownloadurl=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/archive/refs/heads/${GITHUB_REF_NAME}.zip")
        {
          echo "response=${RESPONSE}"
          echo "response_headers<<EOF"
          cat "${HEADERS_FILE}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
      shell: bash

    - name: Evaluate the response
      if: steps.version-check.outputs.should_deploy == 'true'
      id: evaluate-response
      env:
        RESPONSE: ${{ steps.add-version.outputs.response }}
        RESPONSE_HEADERS: ${{ steps.add-version.outputs.response_headers }}
        PLUGIN: ${{ inputs.plugin_name }}
        ENDPOINT: https://moodle.org/webservice/rest/server.php
        TOKEN: ${{ inputs.moodle_org_token }}
      run: |
        jq <<< "${RESPONSE}" || true
        if ! jq --exit-status ".id" <<< "${RESPONSE}" > /dev/null 2>&1; then
          echo "Initial API call did not return a version ID."
          echo "Response headers:"
          echo "${RESPONSE_HEADERS}"
          echo "Response body:"
          echo "${RESPONSE}"
          echo ""
          echo "The endpoint may have timed out but still processed the request."

          PLUGIN_VERSION=$(grep -oP '\$plugin->version\s*=\s*\K[0-9]+' plugin/version.php)
          echo "Checking moodle.org for plugin version ${PLUGIN_VERSION} (branch ${GITHUB_REF_NAME})..."
          echo "Polling every 30s for up to 2 minutes..."

          FOUND=false
          for i in 1 2 3 4; do
            echo "Check attempt ${i}/4..."
            CHECK_RESPONSE=$(curl -s "${ENDPOINT}" \
              --data-urlencode "wstoken=${TOKEN}" \
              --data-urlencode "wsfunction=local_plugins_get_plugin_versions" \
              --data-urlencode "moodlewsrestformat=json" \
              --data-urlencode "frankenstyle=${PLUGIN}")
            echo "Plugin versions response:"
            jq <<< "${CHECK_RESPONSE}" || echo "${CHECK_RESPONSE}"
            if jq --exit-status \
                "[.[] | select(.version == ${PLUGIN_VERSION} or .vcsbranch == \"${GITHUB_REF_NAME}\")] | length > 0" \
                <<< "${CHECK_RESPONSE}" > /dev/null 2>&1; then
              echo "Success: version ${PLUGIN_VERSION} for branch ${GITHUB_REF_NAME} is registered on moodle.org."
              FOUND=true
              break
            fi
            if [ "${i}" -lt 4 ]; then
              echo "Not found yet, waiting 30 seconds..."
              sleep 30
            fi
          done
          if [ "${FOUND}" != "true" ]; then
            echo "Version ${PLUGIN_VERSION} for branch ${GITHUB_REF_NAME} was not found after polling. Giving up."
            exit 1
          fi
        fi
      shell: bash
