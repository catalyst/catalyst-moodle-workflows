name: 'Plugin setup'
description: 'Run plugin setup'
inputs:
  php:
    description: 'PHP version to use'
    required: true
  node:
    description: 'Node.js version to use'
    required: false
    default: ''
  extra_php_extensions:
    description: 'List of additional php packages to install'
  extra_plugin_runners:
    description: 'Command to install dependencies'
  moodle_branch:
    description: 'Moodle branch to use (for patching)'
  database:
    description: 'Database type (e.g. pgsql, mariadb). Leave empty to skip installation.'
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    - name: Set custom environment variables
      shell: bash
      run: |
        USER_IGNORE_PATHS="${{ inputs.ignore_paths }}"
        if [ -n "${USER_IGNORE_PATHS}" ]; then
          IGNORE_PATHS="${IGNORE_PATHS},${USER_IGNORE_PATHS}"
          echo "IGNORE_PATHS=${IGNORE_PATHS}" >> $GITHUB_ENV
        fi
    - name: Check out repository code
      uses: actions/checkout@v3
      with:
        path: plugin
        submodules: true
    - name: Install node ${{ inputs.node }}
      if: ${{ inputs.node != '' }}
      uses: actions/setup-node@v2
      with:
        node-version: ${{ inputs.node }}

    - name: Setup PHP ${{ inputs.php }}
      uses: shivammathur/setup-php@9e72090525849c5e82e596468b86eb55e9cc5401 # v2.32.0
      with:
        php-version: ${{ inputs.php }}
        ini-values: max_input_vars=5000
        extensions: pgsql, mysqli, zip, gd, xmlrpc, soap, ${{ inputs.extra_php_extensions }}
        coverage: none

    - name: Pull snapshot Docker image and extract artifacts
      shell: bash
      run: |
        BRANCH="${{ inputs.moodle_branch }}"
        # Use provided database for image name; fall back to mariadb for jobs with no database.
        DB="${{ inputs.database || 'mariadb' }}"
        IMAGE="ghcr.io/catalyst/snapshot-${BRANCH}-${DB}"
        IMAGE="${IMAGE//_/-}"
        IMAGE="${IMAGE,,}:latest"
        echo "Pulling snapshot image $IMAGE..."
        docker pull "$IMAGE"
        echo "SNAPSHOT_IMAGE=$IMAGE" >> "$GITHUB_ENV"

        CID=$(docker create "$IMAGE")
        docker cp "$CID:/m-ci.tar.gz" ./m-ci.tar.gz
        docker cp "$CID:/moodle.tar.gz" ./moodle.tar.gz
        docker rm "$CID"
        tar -C "$GITHUB_WORKSPACE" -xzf "$GITHUB_WORKSPACE/m-ci.tar.gz"
        tar -C "$GITHUB_WORKSPACE" -xzf "$GITHUB_WORKSPACE/moodle.tar.gz"
        mkdir -p "$GITHUB_WORKSPACE/moodledata"

    - name: Add moodle-plugin-ci binaries to PATH
      run: |
        START_TS=$(date +%s)
        echo "::group::Add moodle-plugin-ci binaries to PATH"

        # Add dirs to $PATH
        echo $(cd m-ci/bin; pwd) >> $GITHUB_PATH
        echo $(cd m-ci/vendor/bin; pwd) >> $GITHUB_PATH

        END_TS=$(date +%s)
        echo "Add moodle-plugin-ci binaries to PATH took $((END_TS - START_TS))s"
        echo "::endgroup::"
      shell: bash

    - name: Generate en_AU locale
      run: |
        START_TS=$(date +%s)
        echo "::group::Generate en_AU locale"

        # PHPUnit depends on en_AU.UTF-8 locale
        sudo locale-gen en_AU.UTF-8

        END_TS=$(date +%s)
        echo "Generate en_AU locale took $((END_TS - START_TS))s"
        echo "::endgroup::"
      shell: bash

    - name: Install dependencies
      if: ${{ inputs.extra_plugin_runners }}
      run: |
        START_TS=$(date +%s)
        # Install dependencies
        echo "::group::Install dependencies"

        ${{ inputs.extra_plugin_runners }}

        END_TS=$(date +%s)
        echo "Install dependencies took $((END_TS - START_TS))s"
        echo "::endgroup::"
      shell: bash

    - name: Apply plugin branch patch
      run: |
        START_TS=$(date +%s)
        echo "::group::Apply plugin branch patch"

        TARGET_REPO="$GITHUB_WORKSPACE/moodle"
        PATCH="$GITHUB_WORKSPACE/plugin/patch/${{ inputs.moodle_branch }}.diff"

        if [ -f "$PATCH" ]; then
          # moodle/ was extracted from a tarball (no .git); init a repo just for patch application.
          git config --global user.email "test@test.com"
          git config --global user.name "Test"
          git -C "$TARGET_REPO" init --quiet
          git -C "$TARGET_REPO" apply --whitespace=nowarn "$PATCH"
        else
          echo "No plugin branch patch found for ${{ inputs.moodle_branch }}"
        fi

        END_TS=$(date +%s)
        echo "Apply plugin branch patch took $((END_TS - START_TS))s"
        echo "::endgroup::"
      shell: bash

    - name: Restore snapshot artifacts
      if: ${{ inputs.database != '' }}
      run: |
        START_TS=$(date +%s)
        echo "::group::Restore snapshot artifacts"

        # Extract phpunit snapshot from the image.
        CID=$(docker create "$SNAPSHOT_IMAGE")
        if docker cp "$CID:/phpunit-snapshot.zip" ./phpunit-snapshot.zip; then
          echo "Found phpunit snapshot archive in image."
        else
          echo "No phpunit snapshot archive found in image."
          docker rm "$CID"
          exit 1
        fi
        docker rm "$CID"

        END_TS=$(date +%s)
        echo "Restore snapshot artifacts took $((END_TS - START_TS))s"
        echo "::endgroup::"
      shell: bash

    - name: Install plugin into Moodle (no database)
      if: ${{ inputs.database == '' }}
      # For static analysis jobs that don't need a database, copy the plugin into the Moodle
      # directory so that tools like mustache and grunt can find it within Moodle's directory tree.
      run: |
        COMPONENT=$(php -r "
          define('MOODLE_INTERNAL', true);
          define('MATURITY_ALPHA', 50);
          define('MATURITY_BETA', 100);
          define('MATURITY_RC', 150);
          define('MATURITY_STABLE', 200);
          \$plugin = new stdClass();
          include 'plugin/version.php';
          echo \$plugin->component;
        ")
        TYPE=$(echo "$COMPONENT" | cut -d_ -f1)
        NAME=$(echo "$COMPONENT" | cut -d_ -f2-)
        TYPE_DIR=$(php -r "
          \$components = json_decode(file_get_contents('$GITHUB_WORKSPACE/moodle/lib/components.json'), true);
          \$type = '$TYPE';
          if (!isset(\$components['plugintypes'][\$type])) { fwrite(STDERR, 'Unknown plugin type: ' . \$type . PHP_EOL); exit(1); }
          echo \$components['plugintypes'][\$type];
        ")
        PLUGIN_PATH="$GITHUB_WORKSPACE/moodle/$TYPE_DIR/$NAME"
        mkdir -p "$PLUGIN_PATH"
        cp -r plugin/. "$PLUGIN_PATH/"
        rm -rf "$PLUGIN_PATH/.git"

        echo "MOODLE_DIR=$GITHUB_WORKSPACE/moodle" >> "$GITHUB_ENV"
        echo "PLUGIN_DIR=$PLUGIN_PATH" >> "$GITHUB_ENV"
      shell: bash
