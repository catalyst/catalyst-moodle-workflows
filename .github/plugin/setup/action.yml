name: 'Plugin setup'
description: 'Run plugin setup'
inputs:
  php:
    description: 'PHP version to use'
    required: true
  node:
    description: 'Node.js version to use'
    required: true
  extra_php_extensions:
    description: 'List of additional php packages to install'
  extra_plugin_runners:
    description: 'Command to install dependencies'
  moodle_branch:
    description: 'Moodle branch to use (for patching)'
  database:
    description: 'Database type (e.g. pgsql, mariadb). Leave empty to skip installation.'
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    - name: Set custom environment variables
      shell: bash
      run: |
        USER_IGNORE_PATHS="${{ inputs.ignore_paths }}"
        if [ -n "${USER_IGNORE_PATHS}" ]; then
          IGNORE_PATHS="${IGNORE_PATHS},${USER_IGNORE_PATHS}"
          echo "IGNORE_PATHS=${IGNORE_PATHS}" >> $GITHUB_ENV
        fi
    - name: Check out repository code
      uses: actions/checkout@v3
      with:
        path: plugin
        submodules: true
    - name: Install node ${{ inputs.node }}
      uses: actions/setup-node@v2
      with:
        node-version: ${{ inputs.node }}

    - name: Setup PHP ${{ inputs.php }}
      uses: shivammathur/setup-php@9e72090525849c5e82e596468b86eb55e9cc5401 # v2.32.0
      with:
        php-version: ${{ inputs.php }}
        ini-values: max_input_vars=5000
        extensions: pgsql, mysqli, zip, gd, xmlrpc, soap, ${{ inputs.extra_php_extensions }}
        coverage: none

    - name: Configure Required Composer Version
      id: install-composer
      if: ${{ inputs.moodle_branch == 'MOODLE_32_STABLE' || inputs.moodle_branch == 'MOODLE_33_STABLE' }}
      run: |
        echo "::set-output name=COMPOSER_VERSION::--1"
      shell: bash

    - name: Update Composer
      if: ${{ inputs.moodle_branch == 'MOODLE_32_STABLE' || inputs.moodle_branch == 'MOODLE_33_STABLE' }}
      run: |
        time composer self-update ${{ steps.install-composer1.outputs.COMPOSER_VERSION }}
      shell: bash

    - name: Initialise moodle-plugin-ci
      run: |
        # Initialise moodle-plugin-ci (install via composer)
        echo "::group::Initialise moodle-plugin-ci"

        time composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci m-ci ^4
        # Add dirs to $PATH
        echo $(cd m-ci/bin; pwd) >> $GITHUB_PATH
        echo $(cd m-ci/vendor/bin; pwd) >> $GITHUB_PATH
        # PHPUnit depends on en_AU.UTF-8 locale
        sudo locale-gen en_AU.UTF-8

        echo "::endgroup::"
      shell: bash

    - name: Install dependencies
      if: ${{ inputs.extra_plugin_runners }}
      run: |
        # Install dependencies
        echo "::group::Install dependencies"

        ${{ inputs.extra_plugin_runners }}

        echo "::endgroup::"
      shell: bash

    - name: Clone Moodle
      # Clone to a temporary directory
      run: |
        echo "::group::Moodle clone output"

        time git clone https://github.com/moodle/moodle.git --branch $MOODLE_BRANCH $GITHUB_WORKSPACE/moodletemp

        echo "::endgroup::"
      shell: bash
      env:
        DB: ${{ inputs.database }}
        MOODLE_BRANCH: ${{ inputs.moodle_branch }}

    - name: Install Core Patches
      if: ${{ always() }}
      # Install core patches to moodle in temporary directory
      run: |
        git config --global user.email "test@test.com"
        git config --global user.name "Test"
        ((test -f plugin/patch/${{ inputs.moodle_branch }}.diff && cd $GITHUB_WORKSPACE/moodletemp && git am --whitespace=nowarn < ../plugin/patch/${{ inputs.moodle_branch }}.diff) || echo No patch found;)
      shell: bash

    - name: Install plugin into Moodle (no database)
      if: ${{ inputs.database == '' }}
      # For static analysis jobs that don't need a database, copy the plugin into the Moodle
      # directory so that tools like mustache and grunt can find it within Moodle's directory tree.
      run: |
        COMPONENT=$(php -r "
          define('MOODLE_INTERNAL', true);
          define('MATURITY_ALPHA', 50);
          define('MATURITY_BETA', 100);
          define('MATURITY_RC', 150);
          define('MATURITY_STABLE', 200);
          \$plugin = new stdClass();
          include 'plugin/version.php';
          echo \$plugin->component;
        ")
        TYPE=$(echo "$COMPONENT" | cut -d_ -f1)
        NAME=$(echo "$COMPONENT" | cut -d_ -f2-)
        TYPE_DIR=$(php -r "
          \$components = json_decode(file_get_contents('$GITHUB_WORKSPACE/moodletemp/lib/components.json'), true);
          \$type = '$TYPE';
          if (!isset(\$components['plugintypes'][\$type])) { fwrite(STDERR, 'Unknown plugin type: ' . \$type . PHP_EOL); exit(1); }
          echo \$components['plugintypes'][\$type];
        ")
        PLUGIN_PATH="$GITHUB_WORKSPACE/moodletemp/$TYPE_DIR/$NAME"
        mkdir -p "$PLUGIN_PATH"
        cp -r plugin/. "$PLUGIN_PATH/"
        rm -rf "$PLUGIN_PATH/.git"

        # Create a minimal config.php so tools that bootstrap Moodle (e.g. validate) can load
        # core_component without connecting to a database (ABORT_AFTER_CONFIG is set by moodle-plugin-ci).
        cat > "$GITHUB_WORKSPACE/moodletemp/config.php" << 'EOF'
<?php
global $CFG;
$CFG = new stdClass();
$CFG->dbtype    = 'pgsql';
$CFG->dblibrary = 'native';
$CFG->dbhost    = 'fakehost';
$CFG->dbname    = 'fakedb';
$CFG->dbuser    = 'fakeuser';
$CFG->dbpass    = '';
$CFG->prefix    = 'mdl_';
$CFG->dboptions = [];
$CFG->wwwroot   = 'http://localhost';
$CFG->dataroot  = '/tmp/moodledata';
$CFG->admin     = 'admin';
$CFG->directorypermissions = 0777;
require_once(__DIR__ . '/lib/setup.php');
EOF
        echo "MOODLE_DIR=$GITHUB_WORKSPACE/moodletemp" >> "$GITHUB_ENV"
        echo "PLUGIN_DIR=$PLUGIN_PATH" >> "$GITHUB_ENV"
      shell: bash

    - name: Install Moodle and Plugin
      if: ${{ inputs.database != '' }}
      # Install moodle, but use our temporary directory to include any potential core patches that have been applied.
      run: |
        # Install moodle commands
        echo "::group::Moodle install output"

        # This is a workaround for https://github.com/moodlehq/moodle-plugin-ci/issues/306 - we disable the git repository validation to allow folder cloning.
        sed -i '/public function gitUrl($url)/{n; s/{/& return $url;/}' $GITHUB_WORKSPACE/m-ci/src/Validate.php

        time moodle-plugin-ci install -vvv --plugin ./plugin --db-host=127.0.0.1 --repo $GITHUB_WORKSPACE/moodletemp

        echo "::endgroup::"
      shell: bash
      env:
        DB: ${{ inputs.database }}
        MOODLE_BRANCH: ${{ inputs.moodle_branch }}
