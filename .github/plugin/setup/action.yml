name: 'Plugin setup'
description: 'Run plugin setup'
inputs:
  php:
    description: 'PHP version to use'
    required: true
  node:
    description: 'Node.js version to use'
    required: false
    default: ''
  extra_php_extensions:
    description: 'List of additional php packages to install'
  extra_plugin_runners:
    description: 'Command to install dependencies'
  moodle_branch:
    description: 'Moodle branch to use (for patching)'
  database:
    description: 'Database type (e.g. pgsql, mariadb). Leave empty to skip installation.'
    required: false
    default: ''
  run_plugin_ci_install:
    description: 'Whether to run moodle-plugin-ci install for database-enabled jobs.'
    required: false
    default: 'true'
  use_phpunit_snapshot:
    description: 'Whether to restore Moodle tree and phpunit DB snapshot artifacts.'
    required: false
    default: 'false'
runs:
  using: "composite"
  steps:
    - name: Set custom environment variables
      shell: bash
      run: |
        USER_IGNORE_PATHS="${{ inputs.ignore_paths }}"
        if [ -n "${USER_IGNORE_PATHS}" ]; then
          IGNORE_PATHS="${IGNORE_PATHS},${USER_IGNORE_PATHS}"
          echo "IGNORE_PATHS=${IGNORE_PATHS}" >> $GITHUB_ENV
        fi
    - name: Check out repository code
      uses: actions/checkout@v3
      with:
        path: plugin
        submodules: true
    - name: Install node ${{ inputs.node }}
      if: ${{ inputs.node != '' }}
      uses: actions/setup-node@v2
      with:
        node-version: ${{ inputs.node }}

    - name: Setup PHP ${{ inputs.php }}
      uses: shivammathur/setup-php@9e72090525849c5e82e596468b86eb55e9cc5401 # v2.32.0
      with:
        php-version: ${{ inputs.php }}
        ini-values: max_input_vars=5000
        extensions: pgsql, mysqli, zip, gd, xmlrpc, soap, ${{ inputs.extra_php_extensions }}
        coverage: none

    - name: Configure Required Composer Version
      id: install-composer
      if: ${{ inputs.moodle_branch == 'MOODLE_32_STABLE' || inputs.moodle_branch == 'MOODLE_33_STABLE' }}
      run: |
        echo "::set-output name=COMPOSER_VERSION::--1"
      shell: bash

    - name: Update Composer
      if: ${{ inputs.moodle_branch == 'MOODLE_32_STABLE' || inputs.moodle_branch == 'MOODLE_33_STABLE' }}
      run: |
        time composer self-update ${{ steps.install-composer1.outputs.COMPOSER_VERSION }}
      shell: bash

    - name: Install moodle-plugin-ci
      if: ${{ inputs.use_phpunit_snapshot != 'true' }}
      run: |
        START_TS=$(date +%s)
        echo "::group::Install moodle-plugin-ci"

        composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci m-ci ^4

        END_TS=$(date +%s)
        echo "Install moodle-plugin-ci took $((END_TS - START_TS))s"
        echo "::endgroup::"
      shell: bash

    - name: Add moodle-plugin-ci binaries to PATH
      run: |
        START_TS=$(date +%s)
        echo "::group::Add moodle-plugin-ci binaries to PATH"

        time composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci m-ci ^4
        # Add dirs to $PATH
        echo $(cd m-ci/bin; pwd) >> $GITHUB_PATH
        echo $(cd m-ci/vendor/bin; pwd) >> $GITHUB_PATH

        END_TS=$(date +%s)
        echo "Add moodle-plugin-ci binaries to PATH took $((END_TS - START_TS))s"
        echo "::endgroup::"
      shell: bash

    - name: Generate en_AU locale
      run: |
        START_TS=$(date +%s)
        echo "::group::Generate en_AU locale"

        # PHPUnit depends on en_AU.UTF-8 locale
        sudo locale-gen en_AU.UTF-8

        END_TS=$(date +%s)
        echo "Generate en_AU locale took $((END_TS - START_TS))s"
        echo "::endgroup::"
      shell: bash

    - name: Install dependencies
      if: ${{ inputs.extra_plugin_runners }}
      run: |
        START_TS=$(date +%s)
        # Install dependencies
        echo "::group::Install dependencies"

        ${{ inputs.extra_plugin_runners }}

        END_TS=$(date +%s)
        echo "Install dependencies took $((END_TS - START_TS))s"
        echo "::endgroup::"
      shell: bash

    - name: Restore snapshot artifacts
      if: ${{ inputs.database != '' && inputs.use_phpunit_snapshot == 'true' }}
      run: |
        START_TS=$(date +%s)
        echo "::group::Restore snapshot artifacts"

        BRANCH="${{ inputs.moodle_branch }}"
        DB="${{ inputs.database }}"
        # Build image name: snapshot-{branch}-{db}, lowercased, underscores->hyphens.
        IMAGE="ghcr.io/catalyst/snapshot-${BRANCH}-${DB}"
        IMAGE="${IMAGE//_/-}"
        IMAGE="${IMAGE,,}:latest"
        time git clone https://github.com/moodle/moodle.git --branch $MOODLE_BRANCH $GITHUB_WORKSPACE/moodletemp

        echo "Pulling snapshot image $IMAGE..."
        docker pull "$IMAGE"

        # Extract snapshot artifacts from the image.
        CID=$(docker create "$IMAGE")
        if docker cp "$CID:/phpunit-snapshot.zip" ./phpunit-snapshot.zip; then
          echo "Found phpunit snapshot archive in image."
        else
          echo "No phpunit snapshot archive found in image."
          docker rm "$CID"
          exit 1
        fi
        if docker cp "$CID:/moodle.tar.gz" ./moodle.tar.gz; then
          echo "Found Moodle snapshot tree archive in image."
        else
          echo "No Moodle snapshot tree archive found in image."
          docker rm "$CID"
          exit 1
        fi
        if docker cp "$CID:/m-ci.tar.gz" ./m-ci.tar.gz; then
          echo "Found moodle-plugin-ci archive in image."
        else
          echo "No moodle-plugin-ci archive found in image."
          docker rm "$CID"
          exit 1
        fi
        docker rm "$CID"

        tar -C "$GITHUB_WORKSPACE" -xzf "$GITHUB_WORKSPACE/m-ci.tar.gz"

        rm -rf "$GITHUB_WORKSPACE/moodle"
        tar -C "$GITHUB_WORKSPACE" -xzf "$GITHUB_WORKSPACE/moodle.tar.gz"

        END_TS=$(date +%s)
        echo "Restore snapshot artifacts took $((END_TS - START_TS))s"
        echo "::endgroup::"
      shell: bash

    - name: Apply plugin branch patch
      if: ${{ inputs.database != '' && inputs.use_phpunit_snapshot == 'true' }}
      run: |
        START_TS=$(date +%s)
        echo "::group::Apply plugin branch patch"

        git config --global user.email "test@test.com"
        git config --global user.name "Test"

        TARGET_REPO="$GITHUB_WORKSPACE/moodle"

        ((test -f plugin/patch/${{ inputs.moodle_branch }}.diff && cd "$TARGET_REPO" && git am --whitespace=nowarn < "$GITHUB_WORKSPACE/plugin/patch/${{ inputs.moodle_branch }}.diff") || echo No plugin branch patch found;)

        END_TS=$(date +%s)
        echo "Apply plugin branch patch took $((END_TS - START_TS))s"
        echo "::endgroup::"
      shell: bash

    - name: Install Moodle and Plugin
      if: ${{ inputs.database != '' && inputs.run_plugin_ci_install == 'true' && inputs.use_phpunit_snapshot != 'true' }}
      run: |
        START_TS=$(date +%s)
        # Install moodle commands
        echo "::group::Moodle install output"

        moodle-plugin-ci install -vvv --plugin ./plugin --db-host=127.0.0.1

        END_TS=$(date +%s)
        echo "Moodle install output took $((END_TS - START_TS))s"
        echo "::endgroup::"
      shell: bash
      env:
        DB: ${{ inputs.database }}
        MOODLE_BRANCH: ${{ inputs.moodle_branch }}

    - name: Restore PHPUnit DB snapshot
      if: ${{ inputs.database != '' && inputs.use_phpunit_snapshot == 'true' }}
      run: |
        START_TS=$(date +%s)
        echo "::group::Restore PHPUnit DB snapshot"

        if [ ! -f "$GITHUB_WORKSPACE/phpunit-snapshot.zip" ]; then
          echo "No phpunit snapshot archive present; can not restore phpunit DB snapshot."
          exit 1
        fi

        cd "$GITHUB_WORKSPACE/moodle"

        time moodle-plugin-ci install -vvv --plugin ./plugin --db-host=127.0.0.1 --repo $GITHUB_WORKSPACE/moodletemp

        PHPUNIT_DATAROOT=$(php -r "define('CLI_SCRIPT', true); require 'config.php'; echo \$CFG->phpunit_dataroot;")
        mkdir -p "$PHPUNIT_DATAROOT"

        cp "$GITHUB_WORKSPACE/phpunit-snapshot.zip" "$PHPUNIT_DATAROOT/ci-phpunit.zip"
        php "$PHPUNIT_UTIL" --restore=ci-phpunit

        END_TS=$(date +%s)
        echo "Restore PHPUnit DB snapshot took $((END_TS - START_TS))s"
        echo "::endgroup::"
      shell: bash