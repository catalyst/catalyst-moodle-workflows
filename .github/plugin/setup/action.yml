name: 'Plugin setup'
description: 'Run plugin setup'
inputs:
  php:
    description: 'PHP version to use'
    required: true
  node:
    description: 'Node.js version to use'
    required: true
  extra_php_extensions:
    description: 'List of additional php packages to install'
  extra_plugin_runners:
    description: 'Command to install dependencies'
  moodle_branch:
    description: 'Moodle branch to use (for patching)'
  database:
    description: 'Database type (e.g. pgsql, mariadb). Leave empty to skip installation.'
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    - name: Set custom environment variables
      shell: bash
      run: |
        USER_IGNORE_PATHS="${{ inputs.ignore_paths }}"
        if [ -n "${USER_IGNORE_PATHS}" ]; then
          IGNORE_PATHS="${IGNORE_PATHS},${USER_IGNORE_PATHS}"
          echo "IGNORE_PATHS=${IGNORE_PATHS}" >> $GITHUB_ENV
        fi
    - name: Check out repository code
      uses: actions/checkout@v3
      with:
        path: plugin
        submodules: true
    - name: Install node ${{ inputs.node }}
      uses: actions/setup-node@v2
      with:
        node-version: ${{ inputs.node }}

    - name: Setup PHP ${{ inputs.php }}
      uses: shivammathur/setup-php@9e72090525849c5e82e596468b86eb55e9cc5401 # v2.32.0
      with:
        php-version: ${{ inputs.php }}
        ini-values: max_input_vars=5000
        extensions: pgsql, mysqli, zip, gd, xmlrpc, soap, ${{ inputs.extra_php_extensions }}
        coverage: none

    - name: Configure Required Composer Version
      id: install-composer
      if: ${{ inputs.moodle_branch == 'MOODLE_32_STABLE' || inputs.moodle_branch == 'MOODLE_33_STABLE' }}
      run: |
        echo "::set-output name=COMPOSER_VERSION::--1"
      shell: bash

    - name: Update Composer
      if: ${{ inputs.moodle_branch == 'MOODLE_32_STABLE' || inputs.moodle_branch == 'MOODLE_33_STABLE' }}
      run: |
        composer self-update ${{ steps.install-composer1.outputs.COMPOSER_VERSION }}
      shell: bash

    - name: Initialise moodle-plugin-ci
      run: |
        # Initialise moodle-plugin-ci (install via composer)
        echo "::group::Initialise moodle-plugin-ci"

        composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci m-ci ^4
        # Add dirs to $PATH
        echo $(cd m-ci/bin; pwd) >> $GITHUB_PATH
        echo $(cd m-ci/vendor/bin; pwd) >> $GITHUB_PATH
        # PHPUnit depends on en_AU.UTF-8 locale
        sudo locale-gen en_AU.UTF-8

        echo "::endgroup::"
      shell: bash

    - name: Install dependencies
      if: ${{ inputs.extra_plugin_runners }}
      run: |
        # Install dependencies
        echo "::group::Install dependencies"

        ${{ inputs.extra_plugin_runners }}

        echo "::endgroup::"
      shell: bash

    - name: Clone Moodle
      # Clone to a temporary directory
      run: |
        echo "::group::Moodle clone output"

        git clone https://github.com/moodle/moodle.git --branch $MOODLE_BRANCH $GITHUB_WORKSPACE/moodletemp

        echo "::endgroup::"
      shell: bash
      env:
        DB: ${{ inputs.database }}
        MOODLE_BRANCH: ${{ inputs.moodle_branch }}

    - name: Install Core Patches
      if: ${{ always() }}
      # Install core patches to moodle in temporary directory
      run: |
        git config --global user.email "test@test.com"
        git config --global user.name "Test"
        ((test -f plugin/patch/${{ inputs.moodle_branch }}.diff && cd $GITHUB_WORKSPACE/moodletemp && git am --whitespace=nowarn < ../plugin/patch/${{ inputs.moodle_branch }}.diff) || echo No patch found;)
      shell: bash

    - name: Install Shared Core Patches
      if: ${{ always() }}
      # Apply versioned patches from ci/.github/patches/ in alphabetical order.
      # Patch filenames must be prefixed with MIN-MAX- version range, e.g. 500-999-name.patch.
      # The range is matched against the numeric part of MOODLE_XXX_STABLE ('main' = 999).
      # Any patch that matches and fails to apply causes the job to fail immediately.
      run: |
        MOODLE_BRANCH="${{ inputs.moodle_branch }}"
        if [[ "$MOODLE_BRANCH" == "main" ]]; then
          BRANCH_NUM=999
        elif [[ "$MOODLE_BRANCH" =~ MOODLE_([0-9]+)_STABLE ]]; then
          BRANCH_NUM=${BASH_REMATCH[1]}
        else
          echo "Could not parse branch number from '$MOODLE_BRANCH', skipping shared patches."
          exit 0
        fi

        PATCHES_DIR="${GITHUB_WORKSPACE}/ci/.github/patches"
        if [ ! -d "$PATCHES_DIR" ]; then
          echo "No shared patches directory found at $PATCHES_DIR, skipping."
          exit 0
        fi

        shopt -s nullglob
        PATCH_FILES=( "$PATCHES_DIR"/*.patch )
        if [ ${#PATCH_FILES[@]} -eq 0 ]; then
          echo "No patch files found in $PATCHES_DIR"
          exit 0
        fi

        for PATCHFILE in "${PATCH_FILES[@]}"; do
          BASENAME=$(basename "$PATCHFILE")
          if [[ "$BASENAME" =~ ^([0-9]+)-([0-9]+)- ]]; then
            MIN_VER=${BASH_REMATCH[1]}
            MAX_VER=${BASH_REMATCH[2]}
            if (( BRANCH_NUM < MIN_VER || BRANCH_NUM > MAX_VER )); then
              echo "Skipping $BASENAME (branch $BRANCH_NUM not in range $MIN_VER-$MAX_VER)"
              continue
            fi
          else
            echo "WARNING: patch $BASENAME has no version prefix (expected NNN-NNN-name.patch), skipping."
            continue
          fi

          echo "Applying shared patch $BASENAME to branch $MOODLE_BRANCH..."
          cd "$GITHUB_WORKSPACE/moodletemp"
          git am --whitespace=nowarn < "$PATCHFILE"
        done
      shell: bash

    - name: Install Moodle and Plugin
      if: ${{ inputs.database != '' }}
      # Install moodle, but use our temporary directory to include any potential core patches that have been applied.
      run: |
        # Install moodle commands
        echo "::group::Moodle install output"

        # This is a workaround for https://github.com/moodlehq/moodle-plugin-ci/issues/306 - we disable the git repository validation to allow folder cloning.
        sed -i '/public function gitUrl($url)/{n; s/{/& return $url;/}' $GITHUB_WORKSPACE/m-ci/src/Validate.php

        moodle-plugin-ci install -vvv --plugin ./plugin --db-host=127.0.0.1 --repo $GITHUB_WORKSPACE/moodletemp

        echo "::endgroup::"
      shell: bash
      env:
        DB: ${{ inputs.database }}
        MOODLE_BRANCH: ${{ inputs.moodle_branch }}